<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVibe - 视频分享平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <a href="#" class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="#ff444f">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                <span>StreamVibe</span>
            </a>
        </div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" placeholder="搜索视频..." id="searchInput">
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="themeToggle" title="切换主题">
                <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
            <button class="upload-btn" id="uploadBtn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5.5L6 12l5 5V13h3v2h2v-2h-3zm2.466 7.732l1.268-1.267c.39-.39.39-1.023 0-1.413-.39-.39-1.023-.39-1.413 0L17.5 19.12l-1.267-1.267c-.39-.39-1.023-.39-1.413 0-.39.39-.39 1.023 0 1.413l1.267 1.267-1.268 1.268c-.39.39-.39 1.023 0 1.413.195.195.45.293.706.293s.512-.098.707-.293l1.268-1.268 1.267 1.267c.195.195.451.293.706.293s.512-.098.707-.293c.39-.39.39-1.023 0-1.413l-1.268-1.268z"/></svg>
                <span>上传</span>
            </button>
            <button class="avatar-btn" id="avatarBtn">
                <div class="avatar">U</div>
            </button>
        </div>
    </header>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="home">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>首页</span>
            </a>
            <a href="#" class="nav-item" data-page="trending">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                <span>热门</span>
            </a>
            <a href="#" class="nav-item" data-page="subscriptions">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                <span>订阅</span>
            </a>
            <a href="#" class="nav-item" data-page="library">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM12 5.5v9l6-4.5z"/></svg>
                <span>收藏夹</span>
            </a>
            <div class="sidebar-divider"></div>
            <a href="#" class="nav-item" data-page="history">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                <span>历史记录</span>
            </a>
        </nav>
        <div class="sidebar-section">
            <h3 class="sidebar-title">分类</h3>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item category-item" data-category="all">🎮 游戏</a>
                <a href="#" class="nav-item category-item" data-category="music">🎵 音乐</a>
                <a href="#" class="nav-item category-item" data-category="education">📚 教育</a>
                <a href="#" class="nav-item category-item" data-category="entertainment">🎭 娱乐</a>
                <a href="#" class="nav-item category-item" data-category="tech">💻 科技</a>
                <a href="#" class="nav-item category-item" data-category="sports">⚽ 体育</a>
                <a href="#" class="nav-item category-item" data-category="cooking">🍳 美食</a>
                <a href="#" class="nav-item category-item" data-category="travel">✈️ 旅行</a>
            </nav>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">
        <!-- 分类标签 -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab-btn active" data-filter="all">全部</button>
            <button class="tab-btn" data-filter="game">🎮 游戏</button>
            <button class="tab-btn" data-filter="music">🎵 音乐</button>
            <button class="tab-btn" data-filter="education">📚 教育</button>
            <button class="tab-btn" data-filter="entertainment">🎭 娱乐</button>
            <button class="tab-btn" data-filter="tech">💻 科技</button>
            <button class="tab-btn" data-filter="sports">⚽ 体育</button>
            <button class="tab-btn" data-filter="cooking">🍳 美食</button>
            <button class="tab-btn" data-filter="travel">✈️ 旅行</button>
        </div>

        <!-- 视频网格 -->
        <div class="video-grid" id="videoGrid"></div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display:none">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor" opacity="0.3"><path d="M12 4v9.38c-.73-.84-1.8-1.38-3-1.38-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V8h6V4h-8zM9.01 14c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3zm10.3-6.3l-1.4 1.4C18.28 9.64 18 10.3 18 11h2c0-.9-.36-1.71-.97-2.3zM20 16c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>
            <p>没有找到相关视频</p>
            <button class="btn-secondary" onclick="filterVideos('all')">查看全部视频</button>
        </div>
    </main>

    <!-- 视频播放器页面 -->
    <div class="video-player-page" id="videoPlayerPage" style="display:none">
        <div class="player-container">
            <button class="back-btn" id="backBtn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                <span>返回</span>
            </button>
            <div class="player-main">
                <div class="video-wrapper">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <svg viewBox="0 0 24 24" width="72" height="72" fill="rgba(255,255,255,0.8)"><path d="M8 5v14l11-7z"/></svg>
                        <p>视频播放器</p>
                        <p class="small">在实际部署中，这里将加载真实视频源</p>
                    </div>
                </div>
                <div class="video-info" id="videoInfo">
                    <!-- 动态填充 -->
                </div>
            </div>
            <div class="sidebar-recommend" id="sidebarRecommend">
                <!-- 推荐视频列表 -->
            </div>
        </div>
    </div>

    <!-- 上传模态框 -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h2>上传视频</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="uploadArea">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <p>拖拽视频文件到这里</p>
                    <p class="small">或点击选择文件</p>
                    <input type="file" accept="video/*" id="fileInput" style="display:none">
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">选择文件</button>
                </div>
                <div class="upload-form" id="uploadForm" style="display:none">
                    <div class="form-group">
                        <label>视频标题</label>
                        <input type="text" placeholder="请输入视频标题" id="videoTitle">
                    </div>
                    <div class="form-group">
                        <label>视频描述</label>
                        <textarea placeholder="请输入视频描述" id="videoDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="videoCategory">
                            <option value="game">🎮 游戏</option>
                            <option value="music">🎵 音乐</option>
                            <option value="education">📚 教育</option>
                            <option value="entertainment">🎭 娱乐</option>
                            <option value="tech">💻 科技</option>
                            <option value="sports">⚽ 体育</option>
                            <option value="cooking">🍳 美食</option>
                            <option value="travel">✈️ 旅行</option>
                        </select>
                    </div>
                    <button class="btn-primary full-width" id="uploadSubmit">开始上传</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
